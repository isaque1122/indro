<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortnite Fan Page</title>
<style>
  /* Reset básico */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html {
    height: 100%;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
  }

  header {
    width: 100%;
    padding: 20px;
    text-align: center;
    background-color: #1a1a2e;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 2.5rem;
    color: #f77f00;
    text-shadow: 2px 2px 5px black;
  }

  main {
    padding: 50px 20px;
    text-align: center;
    width: 100%;
  }

  /* Banner animado */
  .banner {
    width: 300px;
    height: 150px;
    margin: 20px auto;
    background: url('https://cdn2.unrealengine.com/Fortnite%2Fhome%2Fhome-keyart-1920x1080-1920x1080-75aa4d3c3089.jpg') center/cover no-repeat;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.7);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, background 0.3s;
  }

  button:hover {
    transform: scale(1.1);
  }

  .btn-info {
    background-color: #f77f00;
    color: white;
  }

  .btn-fun {
    background-color: #00b4d8;
    color: white;
  }

  /* Box de informações */
  #infoBox {
    margin-top: 20px;
    padding: 20px;
    background-color: rgba(0,0,0,0.6);
    border-radius: 10px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Fortnite Fan Page</h1>
</header>

<main>
  <div class="banner"></div>

  <button class="btn-info" onclick="showInfo()">Curiosidades do Fortnite</button>
  <button class="btn-fun" onclick="funEffect()">Efeito Surpresa!</button>

  <div id="infoBox"></div>
</main>

<script>
  function showInfo() {
    const infoBox = document.getElementById('infoBox');
    infoBox.style.display = 'block';
    infoBox.innerHTML = `
      <h2>Curiosidades:</h2>
      <ul>
        <li>Fortnite foi lançado em 2017 pela Epic Games.</li>
        <li>O modo Battle Royale é gratuito para jogar.</li>
        <li>Existem skins raras que são colecionáveis.</li>
        <li>O jogo recebe atualizações constantes com eventos temáticos.</li>
      </ul>
    `;
  }

  function funEffect() {
    const colors = ['#f77f00', '#00b4d8', '#90be6d', '#f94144', '#f9c74f'];
    document.body.style.background = `linear-gradient(to bottom, ${colors[Math.floor(Math.random()*colors.length)]}, ${colors[Math.floor(Math.random()*colors.length)]})`;
    alert("Boom! Fortnite vibes!");
  }
</script>

</body>
</html>
