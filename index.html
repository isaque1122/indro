<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Yin Yang</title>
<style>
  /* Tela inteira centralizada */
  body, html {
    height: 100%;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #111;
    font-family: Arial, sans-serif;
  }

  /* Container da intro */
  #intro {
    position: absolute;
    width: 200px;
    height: 200px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 1s ease;
  }

  /* Símbolo do Yin Yang */
  .yin-yang {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: conic-gradient(black 0deg 180deg, white 180deg 360deg);
    position: relative;
    animation: spin 3s linear infinite;
  }

  /* Bolinhas internas */
  .yin-yang::before,
  .yin-yang::after {
    content: '';
    position: absolute;
    width: 75px;
    height: 75px;
    border-radius: 50%;
  }

  .yin-yang::before {
    background: white;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  .yin-yang::after {
    background: black;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Animação de giro */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Conteúdo principal */
  #main-content {
    display: none;
    color: white;
    font-size: 2rem;
    z-index: 1;
  }
</style>
</head>
<body>

  <div id="intro">
    <div class="yin-yang"></div>
  </div>

  <div id="main-content">
    Bem-vindo ao site!
  </div>

  <script>
    // Tempo de exibição da intro (4 segundos)
    setTimeout(() => {
      // Fade out da intro
      const intro = document.getElementById('intro');
      intro.style.opacity = 0;

      // Depois do fade, esconder intro e mostrar conteúdo
      setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
      }, 1000); // 1 segundo de transição
    }, 4000);
  </script>

</body>
</html>
